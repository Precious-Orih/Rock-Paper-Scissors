<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock, Paper, Scissors</h1>
    <div class="mainContainer">
        <div>
            <h2 id= "message">Choose a move:</h2>
            <div id="moves">
                <button id="rock"><img src="rock.jpg"></button>
                <button id="paper"><img src="paper.jpg"></button>
                <button id="scissors"><img src="scissors.jpg"></button>
                
            </div>
            <p id="plays"></p>
        </div>
        <div> 
            <h2>Score Board:</h2>
            <ul>
                <li id="wins">Wins: 0</li>
                <li id="losses">Losses: 0</li>
                <li id="ties">Ties: 0</li>
            </ul>
        </div>
        
    </div>
    <div class="bottom">
        <button id="reset" class="bottombtns">Reset</button>
        <button id="autoPlay" class="bottombtns">Auto-play</button>
    </div>
    <script src="index.js"></script>
</body>
</html>
